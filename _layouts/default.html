<!DOCTYPE html>

    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
    {% seo %}
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
